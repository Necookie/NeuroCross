<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Neural Node Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Synapse Gradient -->
    <linearGradient id="synapseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#9ca3af" />
    </linearGradient>

    <!-- Core Gradient -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f3f4f6" />
      <stop offset="100%" stop-color="#d1d5db" />
    </radialGradient>
  </defs>

  <!-- Background (Dark glass-like panel, matching UI) -->
  <rect width="100" height="100" rx="22" fill="#09090b" />

  <!-- The Intersection Paths -->
  <path d="M 50 20 L 50 80 M 20 50 L 80 50" stroke="url(#synapseGrad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Neural Connections (Diagonals) -->
  <path d="M 35 35 L 65 65 M 35 65 L 65 35" stroke="#3f3f46" stroke-width="3" stroke-dasharray="2 4" stroke-linecap="round" />

  <!-- Synaptic Ends (Outer Nodes) -->
  <circle cx="50" cy="20" r="5" fill="#71717a" filter="url(#glow)" />
  <circle cx="50" cy="80" r="5" fill="#71717a" filter="url(#glow)" />
  <circle cx="20" cy="50" r="5" fill="#71717a" filter="url(#glow)" />
  <circle cx="80" cy="50" r="5" fill="#71717a" filter="url(#glow)" />

  <!-- Middle Nodes (Diagonal intersections) -->
  <circle cx="35" cy="35" r="3" fill="#a1a1aa" filter="url(#glow)" />
  <circle cx="65" cy="65" r="3" fill="#a1a1aa" filter="url(#glow)" />
  <circle cx="35" cy="65" r="3" fill="#a1a1aa" filter="url(#glow)" />
  <circle cx="65" cy="35" r="3" fill="#a1a1aa" filter="url(#glow)" />

  <!-- The Core (Central Intersection Node) -->
  <circle cx="50" cy="50" r="10" fill="url(#coreGrad)" filter="url(#glow)" />
  <circle cx="50" cy="50" r="4" fill="#18181b" />
</svg>
